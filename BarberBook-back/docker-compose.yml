services:
  db:
    image: postgres:16-alpine
    container_name: barberbook-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-QuickCut}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "${DB_EXTERNAL_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-QuickCut}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: barberbook-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-QuickCut}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_MINUTES: ${REFRESH_TOKEN_EXPIRE_MINUTES:-10080}
      APP_SCHEME: ${APP_SCHEME:-trimtime}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:19006}
      SQL_ECHO: ${SQL_ECHO:-false}

  nginx:
    image: nginx:1.27-alpine
    container_name: barberbook-nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy_params:/etc/nginx/proxy_params:ro

volumes:
  postgres_data:
